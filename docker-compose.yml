services:
  ollama:
    image: ollama/ollama:latest
    container_name: myeconocoach-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  llm-service:
    build: .
    container_name: myeconocoach-llm
    ports:
      - "8001:8001"
    environment:
      OLLAMA_URL: http://ollama:11434/api/generate
      OLLAMA_MODEL: llama3

    depends_on:
      - ollama

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data:
