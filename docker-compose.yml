services:
  postgres:
    image: postgres:15
    container_name: myeconocoach-postgres
    environment:
      POSTGRES_DB: llm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: myeconocoach-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_THREADS: 4
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  llm-service:
    build: .
    container_name: myeconocoach-llm
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:password@postgres:5432/llm_db
      OLLAMA_URL: http://ollama:11434/api/generate
      OLLAMA_MODEL: llama3
    depends_on:
      - postgres
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data:
  postgres_data:
